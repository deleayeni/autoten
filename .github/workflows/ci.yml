name: CI

on:
    push:
        branches: [main, develop] # Run on both branches
    pull_request:
        branches: [main, develop] # Run on PRs to both branches

jobs:
    lint-and-build:
        runs-on: ubuntu-latest

        steps:
            # 1. Get the code from GitHub
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Set up Node.js environment
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm" # This speeds up future runs by caching dependencies

            # 3. Install dependencies
            - name: Install dependencies
              run: npm ci # Uses package-lock.json for exact versions

            # 4. Check code quality (optional but recommended)
            - name: Run linter
              run: npm run lint

            # 5. Build the project (most important - catches build errors)
            - name: Build project
              run: npm run build
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
